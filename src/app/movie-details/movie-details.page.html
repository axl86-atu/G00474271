<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>MovieDetails</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <h1>{{ movie.title }}</h1>
  <img src="https://image.tmdb.org/t/p/w500{{ movie.poster_path }}" /> 
  <p>{{ movie.overview }}</p>
</ion-content>
