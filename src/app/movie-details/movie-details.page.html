<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>{{ movie.title }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="goHome()">
        <ion-icon name="home"></ion-icon>
      </ion-button>
      <ion-button (click)="goFavourites()">
        <ion-icon name="heart"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <h1>{{ movie.title }}</h1>
  <img *ngIf="movie.poster_path" src="https://image.tmdb.org/t/p/w500{{ movie.poster_path }}" /> <!--same pattern as in details for no image-->
    <p *ngIf="!movie.poster_path">No image</p>
  <p>{{ movie.overview }}</p>

  <ion-button (click)="toggleFavourite()" *ngIf="!isFav">
    <ion-icon name="heart" slot="start"></ion-icon>
    Add To Favourites
  </ion-button>
  <ion-button fill="outline" (click)="toggleFavourite()" *ngIf="isFav"> <!-- https://ionicframework.com/docs/api/input for fill="outline" -->
    <ion-icon name="heart-dislike" slot="start"></ion-icon> <!-- https://ionic.io/ionicons -->
    Remove From Favourites
  </ion-button>

  <h2>Cast</h2>
  <ion-list>
    <ion-item *ngFor="let person of cast" (click)="selectPerson(person)">
      <ion-avatar slot="start">
        <!-- show image if profile_path exists, otherwise show "No image" -->
        <img *ngIf="person.profile_path" src="https://image.tmdb.org/t/p/w200{{ person.profile_path }}" />
        <p *ngIf="!person.profile_path">No image</p>
      </ion-avatar>
      <ion-label>
        <h3>{{ person.character }}</h3>
        <p>{{ person.name }}</p>
      </ion-label>
    </ion-item>
  </ion-list>

  <h2>Crew</h2>
  <ion-list>
    <ion-item *ngFor="let person of crew" (click)="selectPerson(person)">
      <ion-avatar slot="start">
        <img *ngIf="person.profile_path" src="https://image.tmdb.org/t/p/w200{{ person.profile_path }}" />
        <p *ngIf="!person.profile_path">No image</p>
      </ion-avatar>
      <ion-label>
        <h3>{{ person.job }}</h3>
        <p>{{ person.name }}</p>
      </ion-label>
    </ion-item>
  </ion-list>
</ion-content>
