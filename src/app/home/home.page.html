<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      G00474271
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <h2>Today's Trending Movies</h2>
  <ion-card *ngFor="let movie of movies"> <!-- Ionic card for formatting -->
    <img src="https://image.tmdb.org/t/p/w500{{ movie.poster_path }}" />
    <ion-card-header>
      <ion-card-title>{{ movie.title }}</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      {{ movie.overview }}
    </ion-card-content>
  </ion-card>
</ion-content>
